<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: lightgray;
            height: 300px;
            width: 300px;
            
            border: 10px solid black;
            padding: 10px 10px 10px 10px;
            margin: 10px auto 10px auto;
       
         }
        a{
            border-width: 10px;
            border-style: solid;
            border-color: blueviolet;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplos de box level</h1>
    <p>Paragrafos tambem são exemplos de box-level , mas o <a href="#">links são exemplo de box inline level </a> vamos ver como tudo isso funciona</p>
    
</body>
</html>
